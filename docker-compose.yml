services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: telco-oracle-xe
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle123
      APP_USER: telco
      APP_USER_PASSWORD: Telco123
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  oracle-data: